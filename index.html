<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Syncly</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <meta name="application-name" content="Syncly">
  <meta name="theme-color" content="#000000">

  <style>
    :root{
      --c1:#3d7d02;
      --c2:#174800;
      --c3:#071400;
      --fg:rgba(255,255,255,.96);
      --fgDim:rgba(255,255,255,.30);
      --fgFaint:rgba(255,255,255,.145);
      --bgFill:rgba(255,255,255,.95);
      --panel:rgba(14,18,10,.62);
      --fontApple: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Inter", Arial, sans-serif;
      --headerTop: 28px;
      --headerHeight: 70px;
      --lyricsTop: 154px;
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0; background:#000; color:white; font-family:var(--fontApple); overflow:hidden;}
    body{
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 40% 20%, color-mix(in srgb, var(--c1) 80%, transparent), transparent 42%),
        radial-gradient(circle at 70% 75%, color-mix(in srgb, var(--c2) 80%, transparent), transparent 48%),
        linear-gradient(160deg, var(--c1), var(--c2) 45%, var(--c3));
    }
    .ambient{
      position:fixed; inset:-25%;
      background:
        radial-gradient(circle at 24% 18%, color-mix(in srgb, var(--c1) 82%, transparent), transparent 27%),
        radial-gradient(circle at 78% 30%, color-mix(in srgb, var(--c2) 75%, transparent), transparent 31%),
        radial-gradient(circle at 55% 82%, color-mix(in srgb, var(--c3) 65%, transparent), transparent 36%);
      filter: blur(65px) saturate(1.5);
      opacity:.92;
      transform:translate3d(0,0,0);
      pointer-events:none;
    }
    .noise{display:none !important;}

    .shell{
      width:min(100vw, 760px);
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      padding:22px;
      position:relative;
      z-index:3;
    }

    .phone{
      position:relative;
      width:min(430px, 100%);
      height:min(720px, calc(100vh - 190px));
      min-height:520px;
      border-radius:30px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), transparent 18%),
        radial-gradient(circle at 50% -5%, rgba(255,255,255,.12), transparent 32%),
        linear-gradient(160deg, var(--c1), var(--c2) 50%, var(--c3));
      box-shadow:
        0 0 0 1px rgba(255,255,255,.10) inset,
        0 28px 80px rgba(0,0,0,.48);
      isolation:isolate;
    }
    .phone::before{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.18) 65%, rgba(0,0,0,.36)),
        radial-gradient(circle at 40% 25%, rgba(255,255,255,.12), transparent 28%);
      backdrop-filter: blur(1px);
      z-index:-1;
    }














    .trackHead{
      position:absolute;
      top:26px;
      left:34px;
      right:34px;
      display:grid;
      grid-template-columns:70px 1fr;
      gap:14px;
      align-items:center;
      z-index:5;
    }
    .cover{
      width:70px;
      height:70px;
      border-radius:9px;
      background:linear-gradient(135deg, color-mix(in srgb, var(--c1) 80%, white 10%), color-mix(in srgb, var(--c2) 80%, black));
      box-shadow:0 10px 24px rgba(0,0,0,.20);
      object-fit:cover;
      overflow:hidden;
    }
    .song{min-width:0}
    .songTitle{
      font-size:17px;
      line-height:1.05;
      font-weight:780;
      letter-spacing:-.025em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .artist{
      margin-top:4px;
      font-size:16px;
      line-height:1.05;
      color:rgba(255,255,255,.62);
      font-weight:520;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }


    .lyricsScroller{
      height:100%;
      overflow-y:auto;
      scroll-behavior:auto;
      padding:52px 34px 320px;
      scrollbar-width:none;
    }
    .lyricsScroller::-webkit-scrollbar{width:0}

    .line{
      margin:0 0 23px;
      font-weight:760;
      letter-spacing:-.034em;
      line-height:1.055;
      font-size:39px;
      color:var(--fgFaint);
      transform-origin:left center;
      transform:translate3d(0,0,0);
      opacity:.30;
      filter:none;
      transition:
        opacity var(--lineTransitionMs, 220ms) ease,
        transform var(--lineTransitionMs, 220ms) cubic-bezier(.2,.8,.2,1);
      will-change:transform,opacity;
      user-select:none;
    }
    .line.past{
      opacity:.14;
      transform:translate3d(0,-1px,0);
    }
    .line.future{
      opacity:.19;
      transform:translate3d(0,1px,0);
    }
    .line.near{
      opacity:.31;
      transform:translate3d(0,0,0);
    }
    .line.active{
      opacity:1;
      transform:translate3d(0,0,0);
    }
    .line .main{
      display:block;
    }
    .main .segment, .bgline .segment{
      vertical-align:baseline;
    }
    .segment{
      display:inline-block;
      position:relative;
      color:rgba(255,255,255,.245);
      --baseDim: rgba(255,255,255,.245);
      --fillStrong: rgba(255,255,255,calc(.92 + var(--boost,0) * .08));
      --edge: clamp(10px, calc(var(--feather,.5) * 24px), 28px);
      background:
        linear-gradient(90deg,
          var(--fillStrong) 0%,
          var(--fillStrong) max(0px, calc(var(--p,0) * 100% - var(--edge))),
          color-mix(in srgb, var(--fillStrong) 58%, var(--baseDim)) calc(var(--p,0) * 100%),
          var(--baseDim) min(100%, calc(var(--p,0) * 100% + var(--edge))),
          var(--baseDim) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      text-fill-color:transparent;
      text-shadow:0 0 calc(var(--boost,0) * 18px) rgba(255,255,255,.22);
      transform:translate3d(0, calc(var(--lift,0) * -1px), 0);
      transition:filter 80ms linear, text-shadow 120ms linear, transform 90ms linear;
    }
    .line.active .segment{
      color:rgba(255,255,255,.36);
      --baseDim: rgba(255,255,255,.36);
      --fillStrong: rgba(255,255,255,calc(.94 + var(--boost,0) * .06));
      --edge: clamp(10px, calc(var(--feather,.5) * 24px), 30px);
      background:
        linear-gradient(90deg,
          var(--fillStrong) 0%,
          var(--fillStrong) max(0px, calc(var(--p,0) * 100% - var(--edge))),
          color-mix(in srgb, var(--fillStrong) 58%, var(--baseDim)) calc(var(--p,0) * 100%),
          var(--baseDim) min(100%, calc(var(--p,0) * 100% + var(--edge))),
          var(--baseDim) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .segment.live{
      filter:brightness(calc(1.02 + var(--boost,0) * .10));
    }
    .segment.done{--p:1}
    .bgline{
      display:block;
      font-size:.63em;
      line-height:1.08;
      letter-spacing:-.035em;
      font-weight:850;
      color:rgba(255,255,255,.22);
      opacity:.92;
      filter:inherit;
    }
    .bgline.bgTop{ margin:0 0 9px; }
    .bgline.bgBottom{ margin:11px 0 0; }
    .bgline .segment{
      color:rgba(255,255,255,.115);
      --baseDim: rgba(255,255,255,.115);
      --fillStrong: rgba(255,255,255,calc(.42 + var(--boost,0) * .08));
      --edge: clamp(8px, calc(var(--feather,.5) * 20px), 24px);
      background:
        linear-gradient(90deg,
          var(--fillStrong) 0%,
          var(--fillStrong) max(0px, calc(var(--p,0) * 100% - var(--edge))),
          color-mix(in srgb, var(--fillStrong) 56%, var(--baseDim)) calc(var(--p,0) * 100%),
          var(--baseDim) min(100%, calc(var(--p,0) * 100% + var(--edge))),
          var(--baseDim) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .bgline.above{
      margin-top:0;
      margin-bottom:9px;
      transform:translate3d(0,4px,0);
    }
    .line.active .bgline.above{
      transform:translate3d(0,0,0);
      transition:transform 260ms cubic-bezier(.2,.8,.2,1), opacity 220ms ease;
    }
    .bgline.below{
      margin-top:9px;
      margin-bottom:0;
      transform:translate3d(0,-4px,0);
    }
    .line.active .bgline.below{
      transform:translate3d(0,0,0);
      transition:transform 260ms cubic-bezier(.2,.8,.2,1), opacity 220ms ease;
    }
    .line:not(.active) .bgline{
      visibility:hidden;
      opacity:0;
    }
    .line.active .bgline .segment{
      color:rgba(255,255,255,.16);
      --baseDim: rgba(255,255,255,.16);
      --fillStrong: rgba(255,255,255,calc(.50 + var(--boost,0) * .09));
      --edge: clamp(8px, calc(var(--feather,.5) * 20px), 24px);
      background:
        linear-gradient(90deg,
          var(--fillStrong) 0%,
          var(--fillStrong) max(0px, calc(var(--p,0) * 100% - var(--edge))),
          color-mix(in srgb, var(--fillStrong) 56%, var(--baseDim)) calc(var(--p,0) * 100%),
          var(--baseDim) min(100%, calc(var(--p,0) * 100% + var(--edge))),
          var(--baseDim) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .aux{
      display:block;
      margin-top:11px;
      font-size:.54em;
      line-height:1.08;
      letter-spacing:-.025em;
      font-weight:720;
      color:rgba(255,255,255,.27);
    }
    .line.active .aux{color:rgba(255,255,255,.48)}
    .placeholder{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      text-align:center;
      padding:40px;
      color:rgba(255,255,255,.60);
      font-weight:800;
      font-size:24px;
      letter-spacing:-.03em;
      line-height:1.15;
    }

    .player{
      position:absolute;
      left:24px;
      right:24px;
      bottom:18px;
      border-radius:16px;
      padding:0;
      background:transparent;
      border:0;
      box-shadow:none;
      backdrop-filter:none;
      z-index:10;
    }
    .times{
      display:flex;
      justify-content:space-between;
      font-size:12px;
      font-weight:700;
      letter-spacing:-.01em;
      color:rgba(255,255,255,.64);
      font-variant-numeric:tabular-nums;
      margin-bottom:7px;
      padding:0 1px;
    }
    .bar{
      height:4px;
      border-radius:99px;
      overflow:hidden;
      background:rgba(255,255,255,.16);
      position:relative;
      cursor:pointer;
    }
    .barFill{
      position:absolute;
      left:0; top:0; bottom:0;
      width:0%;
      background:rgba(255,255,255,.90);
    }
    audio{display:none}

    .side{
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .card{
      border-radius:28px;
      background:rgba(20,20,20,.54);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(26px);
      padding:16px;
      box-shadow:0 18px 60px rgba(0,0,0,.22);
    }
    .card h2{
      margin:0 0 12px;
      font-size:16px;
      line-height:1;
      letter-spacing:-.02em;
    }
    .uploadGrid{display:grid; gap:9px}
    label.upload{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      padding:12px 13px;
      border-radius:17px;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.10);
      cursor:pointer;
      font-size:13px;
      color:rgba(255,255,255,.86);
      font-weight:760;
    }
    label.upload span:last-child{
      max-width:148px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      color:rgba(255,255,255,.46);
      font-weight:520;
    }
    input[type=file]{display:none}
    .field{
      display:grid;
      gap:6px;
      margin-top:10px;
    }
    .field label{
      font-size:12px;
      color:rgba(255,255,255,.46);
      font-weight:750;
    }
    .field input{
      width:100%;
      border:0;
      outline:0;
      border-radius:14px;
      padding:11px 12px;
      background:rgba(255,255,255,.095);
      color:white;
      font:inherit;
      font-size:14px;
      font-weight:650;
    }
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    button.control{
      border:0;
      border-radius:999px;
      background:rgba(255,255,255,.11);
      color:white;
      padding:10px 13px;
      font-weight:800;
      cursor:pointer;
    }
    button.control.active{background:rgba(255,255,255,.26)}
    .meta{
      display:grid;
      gap:8px;
      font-size:13px;
      color:rgba(255,255,255,.62);
    }
    .meta b{color:white}
    .issues{
      overflow:auto;
      flex:1;
      min-height:0;
    }
    .issue{
      border-top:1px solid rgba(255,255,255,.09);
      padding:10px 0;
      color:rgba(255,255,255,.72);
      font-size:12px;
      line-height:1.35;
    }
    .issue:first-child{border-top:0}
    .issue b{color:white}
    .issue.warn b{color:#ffd60a}
    .issue.err b{color:#ff453a}
    .note{
      color:rgba(255,255,255,.50);
      font-size:12px;
      line-height:1.35;
      margin-top:10px;
    }


    /* v10 tuning */
    .bgline{
      font-size:.48em !important;
      line-height:1.04 !important;
      letter-spacing:-.014em !important;
      font-weight:650 !important;
      color:rgba(255,255,255,.13) !important;
      opacity:.64 !important;
      filter:none !important;
    }
    .line.active .bgline{
      opacity:.70 !important;
    }
    .bgline.bgTop{
      margin:0 0 9px !important;
      transform:translate3d(0,4px,0);
      transition:transform 260ms cubic-bezier(.2,.8,.2,1), opacity 220ms ease;
    }
    .line.active .bgline.bgTop{
      transform:translate3d(0,0,0);
    }
    .bgline.bgBottom{
      margin:9px 0 0 !important;
      transform:translate3d(0,-4px,0);
      transition:transform 260ms cubic-bezier(.2,.8,.2,1), opacity 220ms ease;
    }
    .line.active .bgline.bgBottom{
      transform:translate3d(0,0,0);
    }
    .line:not(.active) .bgline{
      visibility:hidden !important;
      opacity:0 !important;
    }
    .bgline .segment{
      --baseDim: rgba(255,255,255,.105) !important;
      --fillStrong: rgba(255,255,255,calc(.38 + var(--boost,0) * .08)) !important;
      --edge: clamp(6px, calc(var(--feather,.5) * 16px), 18px) !important;
    }
    .line.active .bgline .segment{
      --baseDim: rgba(255,255,255,.145) !important;
      --fillStrong: rgba(255,255,255,calc(.46 + var(--boost,0) * .09)) !important;
      --edge: clamp(6px, calc(var(--feather,.5) * 16px), 18px) !important;
    }
    .segment{
      --edge: clamp(6px, calc(var(--feather,.5) * 18px), 20px) !important;
    }


    .line:has(.bgline){
      margin-bottom:28px;
    }

    .bgline .segment{
      transform:translate3d(0, calc(var(--lift,0) * -0.55px), 0) !important;
    }


    body.prestart{
      background:#000 !important;
    }
    body.prestart .ambient{
      opacity:0;
    }
    .startOverlay{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:#000;
      z-index:50;
      transition:opacity 620ms cubic-bezier(.2,.8,.2,1), filter 620ms ease;
    }
    .startOverlay.hidden{
      opacity:0;
      pointer-events:none;
      filter:blur(10px);
    }
    .startInner{
      display:grid;
      gap:18px;
      place-items:center;
      transform:translate3d(0,0,0);
      transition:transform 360ms cubic-bezier(.2,.8,.2,1), opacity 360ms ease;
    }
    .startOverlay.pulse .startInner{
      transform:scale(.985);
      opacity:.92;
    }
    .startFlowBtn{
      min-width:230px;
      height:72px;
      border:1px solid rgba(255,255,255,.16);
      border-radius:999px;
      background:rgba(255,255,255,.96);
      color:#050505;
      font-family:var(--fontApple);
      font-size:22px;
      font-weight:820;
      letter-spacing:-.035em;
      cursor:pointer;
      box-shadow:
        0 24px 70px rgba(255,255,255,.08),
        inset 0 1px 0 rgba(255,255,255,.9);
      transition:transform 180ms cubic-bezier(.2,.8,.2,1), background 180ms ease, opacity 180ms ease;
    }
    .startFlowBtn:hover{
      transform:scale(1.025);
      background:#fff;
    }
    .startFlowBtn:active{
      transform:scale(.97);
    }
    .startFlowInput{
      width:min(330px, calc(100vw - 48px));
      height:58px;
      border:1px solid rgba(255,255,255,.18);
      border-radius:22px;
      padding:0 18px;
      background:rgba(255,255,255,.08);
      color:white;
      font-family:var(--fontApple);
      font-size:20px;
      font-weight:650;
      text-align:center;
      outline:none;
      opacity:0;
      transform:translate3d(0,8px,0);
      pointer-events:none;
      transition:opacity 220ms ease, transform 220ms ease;
    }
    .startFlowInput.visible{
      opacity:1;
      transform:translate3d(0,0,0);
      pointer-events:auto;
    }
    .startFlowInput::placeholder{
      color:rgba(255,255,255,.38);
    }
    .startHint{
      min-height:18px;
      color:rgba(255,255,255,.45);
      font-size:13px;
      font-weight:650;
      letter-spacing:-.01em;
      text-align:center;
    }
    .colorBloom{
      position:fixed;
      inset:0;
      overflow:hidden;
      opacity:0;
      z-index:2;
      pointer-events:none;
      background:#000;
    }
    .colorBloom i{
      position:absolute;
      left:50%;
      top:50%;
      width:28vmax;
      height:28vmax;
      border-radius:50%;
      transform:translate(-50%,-50%) scale(0);
      filter:blur(34px) saturate(1.65);
      opacity:0;
      mix-blend-mode:screen;
    }
    .colorBloom i:nth-child(1){
      background:radial-gradient(circle, color-mix(in srgb, var(--c1) 92%, white 8%), transparent 62%);
    }
    .colorBloom i:nth-child(2){
      background:radial-gradient(circle, color-mix(in srgb, var(--c2) 88%, white 4%), transparent 64%);
      transform:translate(-50%,-50%) scale(0) rotate(40deg);
    }
    .colorBloom i:nth-child(3){
      background:radial-gradient(circle, color-mix(in srgb, var(--c3) 82%, var(--c1) 18%), transparent 66%);
      transform:translate(-50%,-50%) scale(0) rotate(-35deg);
    }
    body.revealing .colorBloom{
      animation:bloomBase 1250ms cubic-bezier(.16,.9,.18,1) forwards;
    }
    body.revealing .colorBloom i:nth-child(1){
      animation:bloomBlob1 1250ms cubic-bezier(.16,.9,.18,1) forwards;
    }
    body.revealing .colorBloom i:nth-child(2){
      animation:bloomBlob2 1320ms cubic-bezier(.16,.9,.18,1) 70ms forwards;
    }
    body.revealing .colorBloom i:nth-child(3){
      animation:bloomBlob3 1380ms cubic-bezier(.16,.9,.18,1) 110ms forwards;
    }
    @keyframes bloomBase{
      0%{opacity:0;background:#000;}
      15%{opacity:1;background:#000;}
      100%{opacity:1;background:transparent;}
    }
    @keyframes bloomBlob1{
      0%{opacity:0; transform:translate(-50%,-50%) scale(.02);}
      18%{opacity:.95;}
      100%{opacity:.94; transform:translate(-50%,-50%) scale(7.8);}
    }
    @keyframes bloomBlob2{
      0%{opacity:0; transform:translate(-50%,-50%) scale(.02) rotate(40deg);}
      16%{opacity:.82;}
      100%{opacity:.76; transform:translate(-52%,-48%) scale(8.9) rotate(40deg);}
    }
    @keyframes bloomBlob3{
      0%{opacity:0; transform:translate(-50%,-50%) scale(.02) rotate(-35deg);}
      18%{opacity:.78;}
      100%{opacity:.72; transform:translate(-46%,-52%) scale(9.4) rotate(-35deg);}
    }
    .shell{
      opacity:0;
      transform:translate3d(0,22px,0) scale(.975);
      pointer-events:none;
      filter:blur(10px);
      transition:
        opacity 860ms cubic-bezier(.2,.8,.2,1) 520ms,
        transform 860ms cubic-bezier(.2,.8,.2,1) 520ms,
        filter 860ms ease 520ms;
    }
    body.appReady .shell{
      opacity:1;
      transform:translate3d(0,0,0) scale(1);
      filter:blur(0);
      pointer-events:auto;
    }
    body.appReady .ambient{
      opacity:1;
      transition:opacity 820ms ease 260ms;
    }




    /* v21: robust player layout, no absolute overlap */
    .phone{
      display:grid !important;
      grid-template-rows: 102px minmax(0,1fr) 46px !important;
      padding:26px 34px 18px !important;
      overflow:hidden !important;
    }
    .trackHead{
      position:relative !important;
      top:auto !important;
      left:auto !important;
      right:auto !important;
      height:70px !important;
      grid-row:1 !important;
      align-self:start !important;
      z-index:8 !important;
    }
    .lyricsArea{
      position:relative !important;
      inset:auto !important;
      top:auto !important;
      left:auto !important;
      right:auto !important;

<script>
(() => {
  const $ = s => document.querySelector(s);

  const ttmlInput = $('#ttmlInput'), audioInput = $('#audioInput'), coverInput = $('#coverInput');
  const ttmlName = $('#ttmlName'), audioName = $('#audioName'), coverName = $('#coverName');
  const titleInput = $('#titleInput'), artistInput = $('#artistInput');
  const titleView = $('#titleView'), artistView = $('#artistView'), coverView = $('#coverView');
  const playBtn = $('#playBtn'), beatBtn = $('#beatBtn'), autoBtn = $('#autoBtn');
  const nowEl = $('#now'), leftEl = $('#left'), bar = $('#bar'), barFill = $('#barFill');
  const lineCount = $('#lineCount'), segCount = $('#segCount'), bgCount = $('#bgCount'), issuesEl = $('#issues');
  const side = $('#side');
  const ttmlBtn = $('#ttmlBtn'), audioBtn = $('#audioBtn'), coverBtn = $('#coverBtn'), errorToast = $('#errorToast');
  const startOverlay = $('#startOverlay'), startFlowBtn = $('#startFlowBtn'), startHint = $('#startHint'), startFlowInput = $('#startFlowInput');
  const flowTtmlInput = $('#flowTtmlInput'), flowAudioInput = $('#flowAudioInput'), flowCoverInput = $('#flowCoverInput');

  let lines = [];
  let active = -1;
  let loadStep = 'start';
  let ttmlLoadedForFlow = false;
  let audioLoadedForFlow = false;
  let coverLoadedForFlow = false;
  let beatMode = true;
  let autoScroll = true;
  let raf = null;
  let audioUrl = null;
  let coverUrl = null;
  window.__lineLerp = 0.082;
  window.__lineTransitionMs = 420;
  document.documentElement.style.setProperty('--lineTransitionMs', '420ms');

  function parseTime(raw){
    if(raw == null) return null;
    const s = String(raw).trim();
    if(!s) return null;
    if(s.endsWith('ms')) return parseFloat(s.slice(0,-2))/1000;
    if(s.endsWith('s') && !s.includes(':')) return parseFloat(s.slice(0,-1));
    const p = s.split(':');
    if(p.length === 3) return (+p[0]||0)*3600 + (+p[1]||0)*60 + parseFloat(p[2]||0);
    if(p.length === 2) return (+p[0]||0)*60 + parseFloat(p[1]||0);
    const n = parseFloat(s);
    return Number.isFinite(n) ? n : null;
  }
  function fmtNow(t){
    if(!Number.isFinite(t)) t=0;
    const m = Math.floor(t/60), s = Math.floor(t%60);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  function fmtLeft(t){
    if(!Number.isFinite(t)) return '00:00';
    const m = Math.floor(t/60), s = Math.floor(t%60);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function attr(el, name){
    if(!el || typeof el.getAttribute !== 'function') return '';
    return el.getAttribute(name) ?? el.getAttribute(name.replace(':','\\:')) ?? '';
  }
  function roleOf(el){
    return attr(el,'ttm:role') || attr(el,'role') || '';
  }
  function cleanBgText(s){
    return String(s || '')
      .replace(/\s+/g,' ')
      .trim()
      .replace(/^[\[(（{]+\s*/,'')
      .replace(/\s*[\])）}]+$/,'')
      .trim();
  }

  function sourceAround(text, lineNo, radius=4){
    const arr = String(text).split(/\r?\n/);
    const n = Math.max(1, Math.min(arr.length, Number(lineNo)||1));
    const a = Math.max(1, n-radius), b = Math.min(arr.length, n+radius);
    return Array.from({length:b-a+1},(_,k)=>{
      const i = a+k;
      return `${String(i).padStart(4,' ')} | ${arr[i-1]}`;
    }).join('\n');
  }
  function extractXmlLine(message){
    const s = String(message || '');
    return (s.match(/line\s+(\d+)/i) || s.match(/Line Number\s+(\d+)/i) || [])[1] || null;
  }
  function autoRepairCommonTTML(text){
    let s = String(text);
    const openDivs = (s.match(/<div(\s|>)/g) || []).length;
    const closeDivs = (s.match(/<\/div>/g) || []).length;
    if(openDivs > closeDivs && /<\/body>/i.test(s)){
      s = s.replace(/<\/body>/i, '</div>\n</body>');
    }
    s = s.replace(/&(?!amp;|lt;|gt;|quot;|apos;|#\d+;|#x[0-9a-fA-F]+;)/g, '&amp;');
    return s;
  }

  function directText(el){
    let out = '';
    el.childNodes.forEach(n => {
      if(n.nodeType === Node.TEXT_NODE) out += n.nodeValue;
    });
    return out.replace(/\s+/g,' ').trim();
  }
  function cleanBgEdge(s){
    return String(s || '')
      .replace(/^[\s\[(（{]+/,'')
      .replace(/[\s\])）}]+$/,'');
  }

  function childTimedSegments(el, skipRole=true){
    const out = [];
    let needSpace = false;

    function addSpace(){
      if(!out.length) return;
      if(out[out.length - 1].text !== ' ') needSpace = true;
    }

    function append(raw, begin=null, end=null, opts={}){
      let text = String(raw || '').replace(/\s+/g, ' ');
      if(!text) return;

      if(opts.cleanBg) text = cleanBgEdge(text);
      if(!text) return;

      if(needSpace && out.length && out[out.length - 1].text !== ' ' && !text.startsWith(' ')){
        out.push({text:' ', spacer:true, begin:null, end:null});
      }
      needSpace = false;

      if(text === ' '){
        addSpace();
        return;
      }

      // Preserve leading/trailing spaces as real separators, but don't create junk at edges.
      const leading = text.startsWith(' ');
      const trailing = text.endsWith(' ');
      text = text.trim();

      if(leading) addSpace();
      if(needSpace && out.length && out[out.length - 1].text !== ' '){
        out.push({text:' ', spacer:true, begin:null, end:null});
      }
      needSpace = false;

      if(text) out.push({text, begin, end});
      if(trailing) addSpace();
    }

    function walk(node, inBg=false){
      node.childNodes.forEach(n => {
        if(n.nodeType === Node.TEXT_NODE){
          const raw = n.nodeValue || '';
          if(/\S/.test(raw)) append(raw, null, null, {cleanBg:inBg});
          else if(/\s/.test(raw)) addSpace();
          return;
        }

        if(n.nodeType !== Node.ELEMENT_NODE || n.localName !== 'span') return;
        const role = roleOf(n);
        const isBg = inBg || role === 'x-bg';

        if(skipRole && role){
          addSpace();
          return;
        }

        const hasElementSpan = [...n.childNodes].some(ch => ch.nodeType === Node.ELEMENT_NODE && ch.localName === 'span');
        if(hasElementSpan){
          walk(n, isBg);
          return;
        }

        append(n.textContent || '', parseTime(n.getAttribute('begin')), parseTime(n.getAttribute('end')), {cleanBg:isBg});
      });
    }

    walk(el, !skipRole && roleOf(el) === 'x-bg');

    while(out.length && out[0].text === ' ') out.shift();
    while(out.length && out[out.length-1].text === ' ') out.pop();
    return out;
  }

  function firstTimedBegin(segs){
    if(!Array.isArray(segs)) return null;
    const hit = segs.find(s => s && s.begin != null && Number.isFinite(Number(s.begin)));
    return hit ? Number(hit.begin) : null;
  }

  function nodePosition(parent, child){
    if(!parent || !child || !parent.childNodes) return 999999;
    return Array.prototype.indexOf.call(parent.childNodes, child);
  }

  function parseHeadAux(doc){
    const map = new Map();
    const texts = [...doc.getElementsByTagName('*')].filter(e => e.localName === 'text' && e.getAttribute('for'));
    for(const t of texts){
      const key = t.getAttribute('for');
      const entry = map.get(key) || {translations:[], romans:[], bg:[]};
      let parent = t.parentElement, kind = 'translation';
      while(parent){
        const ln = parent.localName;
        if(ln === 'transliteration' || ln === 'transliterations'){kind='roman'; break;}
        if(ln === 'translation' || ln === 'translations'){kind='translation'; break;}
        parent = parent.parentElement;
      }
      const bg = [...t.querySelectorAll('span')].filter(s => roleOf(s)==='x-bg').map(s => cleanBgText(s.textContent)).filter(Boolean);
      const txt = directText(t);
      if(txt) (kind === 'roman' ? entry.romans : entry.translations).push(txt);
      entry.bg.push(...bg);
      map.set(key, entry);
    }
    return map;
  }


  function lyricAgentInfo(raw){
    const value = String(raw || '').trim();
    if(!value) return {raw:'', number:null, side:'left'};

    // TTML can be "v2", "#v2", "voice2", or sometimes a space-separated list.
    const first = value.split(/\s+/)[0].replace(/^#/, '');
    const match = first.match(/^(?:v|voice)([1-8])$/i);

    if(!match) return {raw:value, number:null, side:'left'};

    const number = Number(match[1]);
    return {
      raw:value,
      number,
      side:number % 2 === 0 ? 'right' : 'left'
    };
  }

  function parseTTML(text){
    const parser = new DOMParser();
    let doc = parser.parseFromString(text, 'application/xml');
    let err = doc.querySelector('parsererror');
    if(err){
      const repaired = autoRepairCommonTTML(text);
      if(repaired !== text){
        doc = parser.parseFromString(repaired, 'application/xml');
        err = doc.querySelector('parsererror');
        if(!err) window.__repair = 'File was auto-repaired for preview. Useful here, but fix the source TTML before delivery.';
      }
      if(err){
        const msg = err.textContent || 'XML parse error';
        const line = extractXmlLine(msg);
        throw new Error(msg.slice(0,500) + (line ? '\n\n' + sourceAround(text,line) : ''));
      }
    }
    const head = parseHeadAux(doc);
    const ps = [...doc.getElementsByTagName('*')].filter(e => e.localName === 'p');
    const parsed = ps.map((p,i) => {
      const key = attr(p,'itunes:key') || p.getAttribute('id') || `L${i+1}`;
      const agentInfo = lyricAgentInfo(attr(p,'ttm:agent') || attr(p,'agent'));
      const begin = parseTime(p.getAttribute('begin'));
      let end = parseTime(p.getAttribute('end'));

      const bgNodes = [...p.children].filter(ch => ch.localName === 'span' && roleOf(ch) === 'x-bg');
      const trNodes = [...p.children].filter(ch => ch.localName === 'span' && roleOf(ch) === 'x-translation');
      const roNodes = [...p.children].filter(ch => ch.localName === 'span' && roleOf(ch) === 'x-roman');

      const segments = childTimedSegments(p, true);
      let textPlain = segments.map(s => s.text).join('');
      if(!textPlain.trim()){
        const clone = p.cloneNode(true);
        [...clone.querySelectorAll('span')].forEach(s => { if(roleOf(s)) s.remove(); });
        textPlain = clone.textContent || '';
      }

      const mainSegments = segments.length ? segments : [{text:textPlain.replace(/\s+/g,' ').trim(), begin, end}];
      const mainFirstBegin = firstTimedBegin(mainSegments) ?? begin;
      const firstMainNode = [...p.childNodes].find(n => n.nodeType === Node.ELEMENT_NODE && n.localName === 'span' && !roleOf(n));
      const firstMainPos = firstMainNode ? nodePosition(p, firstMainNode) : 999999;
      const topBg = [], bottomBg = [];

      bgNodes.forEach(bg => {
        let segs = childTimedSegments(bg, false);

        // Keep real spaces inside x-bg. Only remove brackets at the outer edges.
        while(segs.length && (segs[0].spacer || segs[0].text === ' ')) segs.shift();
        while(segs.length && (segs[segs.length-1].spacer || segs[segs.length-1].text === ' ')) segs.pop();

        if(segs.length){
          const firstText = segs.find(s => !s.spacer && s.text !== ' ');
          const lastText = [...segs].reverse().find(s => !s.spacer && s.text !== ' ');
          if(firstText) firstText.text = String(firstText.text).replace(/^[\[(（{]+\s*/, '');
          if(lastText) lastText.text = String(lastText.text).replace(/\s*[\])）}]+$/, '');
          segs = segs.filter(s => s.spacer || s.text === ' ' || String(s.text).trim() !== '');
        }

        const txt = cleanBgText(bg.textContent);
        const item = {text:txt, segments:segs.length ? segs : [{text:txt, begin:begin, end:end}]};
        if(!item.text) return;
        const bgFirstBegin = firstTimedBegin(item.segments) ?? begin;
        const bgPos = nodePosition(p, bg);
        const shouldBeTop = (bgFirstBegin != null && mainFirstBegin != null && bgFirstBegin < mainFirstBegin - 0.025) || bgPos < firstMainPos;
        (shouldBeTop ? topBg : bottomBg).push(item);
      });

      const h = head.get(key) || {translations:[], romans:[], bg:[]};
      for(const txt of h.bg){
        const clean = cleanBgText(txt);
        if(clean) bottomBg.push({text:clean, segments:[{text:clean, begin:begin, end:end}]});
      }

      if(end == null){
        const allBg = [...topBg, ...bottomBg];
        const allEnds = [...mainSegments, ...allBg.flatMap(b=>b.segments)].map(s=>s.end).filter(x=>x!=null);
        if(allEnds.length) end = Math.max(...allEnds);
      }
      return {
        key,
        agent:agentInfo.raw,
        agentNumber:agentInfo.number,
        side:agentInfo.side,
        begin,
        end,
        text:textPlain.replace(/\s+/g,' ').trim(),
        segments:mainSegments,
        topBg,
        bottomBg,
        translations:[...trNodes.map(n=>n.textContent.trim()).filter(Boolean), ...h.translations],
        romans:[...roNodes.map(n=>n.textContent.trim()).filter(Boolean), ...h.romans]
      };
    }).filter(l => l.text || l.topBg.length || l.bottomBg.length);
    parsed.sort((a,b)=>(a.begin ?? 0)-(b.begin ?? 0));
    for(let i=0;i<parsed.length;i++){
      if(parsed[i].begin == null && parsed[i].segments[0]?.begin != null) parsed[i].begin = parsed[i].segments[0].begin;
      if(parsed[i].end == null && parsed[i+1]?.begin != null) parsed[i].end = parsed[i+1].begin;
    }
    return parsed;
  }

  function validate(){
    const issues = [];
    if(window.__repair){ issues.push(['warn', window.__repair]); window.__repair = ''; }
    lines.forEach((l,i)=>{
      if(l.begin == null) issues.push(['err',`Line ${i+1}: missing begin.`]);
      if(l.end == null) issues.push(['warn',`Line ${i+1}: missing end.`]);
      if(l.begin != null && l.end != null && l.end <= l.begin) issues.push(['err',`Line ${i+1}: end <= begin.`]);
      const timed = l.segments.filter(s=>s.begin!=null || s.end!=null);
      if(l.segments.length && !timed.length) issues.push(['warn',`Line ${i+1}: no segment/word timing — whole-line timing only.`]);
      for(let j=1;j<l.segments.length;j++){
        const a=l.segments[j-1], b=l.segments[j];
        if(a.end!=null && b.begin!=null && b.begin < a.end-.005) issues.push(['warn',`Line ${i+1}: overlapping segments around ${fmtNow(b.begin)}.`]);
      }
    });
    for(let i=1;i<lines.length;i++){
      if(lines[i-1].end != null && lines[i].begin != null && lines[i].begin < lines[i-1].end-.01){
        issues.push(['warn',`Lines ${i} и ${i+1}: overlap in time.`]);
      }
    }
    if(issuesEl){
      issuesEl.innerHTML = issues.length
        ? issues.slice(0,120).map(([k,m])=>`<div class="issue ${k}"><b>${k==='err'?'Error':'Warning'}:</b><br>${escapeHtml(m)}</div>`).join('')
        : '<div class="issue"><b>OK.</b><br>No basic issues found. Still check line breaks, backing vocals, sustained syllables, and pauses manually.</div>';
    }
  }

  function isWordLike(text){
    return /[\p{L}\p{N}]/u.test(String(text || ''));
  }

  function isWordLike(text){
    return /[\p{L}\p{N}]/u.test(String(text || ''));
  }

  function renderSegments(parent, segs, className='segment'){
    segs.forEach((seg, idx)=>{
      if(seg.spacer || seg.text === ' '){
        parent.appendChild(document.createTextNode(' '));
        return;
      }

      const span = document.createElement('span');
      span.className = className;
      span.textContent = seg.text;
      span.dataset.begin = seg.begin ?? '';
      span.dataset.end = seg.end ?? '';
      span.dataset.idx = idx;

      const prev = segs[idx - 1];
      const next = segs[idx + 1];
      const touchesPrev = prev && !prev.spacer && prev.text !== ' ' && isWordLike(prev.text) && isWordLike(seg.text);
      const touchesNext = next && !next.spacer && next.text !== ' ' && isWordLike(next.text) && isWordLike(seg.text);
      const dur = (seg.begin != null && seg.end != null) ? Math.max(0, seg.end - seg.begin) : 0;

      // Visual intensity for long split/stretched word parts.
      const boost = Math.max(0, Math.min(1, ((touchesPrev || touchesNext) ? dur - .42 : dur - .72) / 1.15));

      // Apple Music-like "word lift":
      // fast words barely move; long sustained parts float up a little and return by end.
      // Split word parts get a bit more movement because Apple visually emphasizes held syllables.
      const liftBase = Math.max(0, Math.min(1, ((touchesPrev || touchesNext) ? dur - .32 : dur - .58) / 1.25));
      const liftPx = ((touchesPrev || touchesNext) ? 9.0 : 6.2) * liftBase;

      span.dataset.boostBase = boost.toFixed(3);
      span.dataset.liftPx = liftPx.toFixed(3);
      span.style.setProperty('--boost', '0');
      span.style.setProperty('--lift', '0');
      span.style.setProperty('--p', '0');

      parent.appendChild(span);
    });
  }

  function render(){
    lyricsEl.innerHTML = '';
    lines.forEach((line, idx)=>{
      const div = document.createElement('div');
      const side = line.side === 'right' ? 'right' : 'left';
      div.className = `line future agent-${side}${line.agentNumber ? ` agent-v${line.agentNumber}` : ''}`;
      div.dataset.idx = idx;
      div.dataset.agent = line.agent || '';
      div.dataset.side = side;

      for(const bg of (line.topBg || [])){
        const b = document.createElement('span');
        b.className = 'bgline bgTop';
        renderSegments(b, bg.segments);
        div.appendChild(b);
      }

      const main = document.createElement('span');
      main.className = 'main';
      renderSegments(main, line.segments);
      div.appendChild(main);

      for(const bg of (line.bottomBg || [])){
        const b = document.createElement('span');
        b.className = 'bgline bgBottom';
        renderSegments(b, bg.segments);
        div.appendChild(b);
      }

      [...line.translations, ...line.romans].filter(Boolean).slice(0,2).forEach(t=>{
        const aux = document.createElement('span');
        aux.className = 'aux';
        aux.textContent = t;
        div.appendChild(aux);
      });

      lyricsEl.appendChild(div);
    });
    placeholder.style.display = lines.length ? 'none':'grid';
    if(lineCount) lineCount.textContent = lines.length;
    if(segCount) segCount.textContent = lines.reduce((n,l)=>n+l.segments.filter(s=>s.begin!=null || s.end!=null).length,0);
    if(bgCount) bgCount.textContent = lines.reduce((n,l)=>n+(l.topBg?.length||0)+(l.bottomBg?.length||0),0);
    active = -1;
    targetScrollTop = 0;
    currentScrollTop = 0;
    lyricsEl.scrollTop = 0;
  }

  function median(values){
    const arr = values.filter(Number.isFinite).sort((a,b)=>a-b);
    if(!arr.length) return null;
    const mid = Math.floor(arr.length / 2);
    return arr.length % 2 ? arr[mid] : (arr[mid - 1] + arr[mid]) / 2;
  }

  function computeTrackTempoStats(){
    // Fixed smooth transition timing.
    window.__lineLerp = 0.082;
    window.__lineTransitionMs = 420;
    document.documentElement.style.setProperty('--lineTransitionMs', '420ms');
  }

  function computeLineSwitches(){
    for(let i=0;i<lines.length;i++){
      const cur = lines[i];
      const prev = lines[i-1];
      const next = lines[i+1];

      // Visual Apple-like line transition:
      // switch at midpoint between previous line end and current line begin.
      // Example: prev ends 00:03.100, current begins 00:03.300 => current activates 00:03.200.
      let switchIn = cur.begin ?? 0;
      if(prev && prev.end != null && cur.begin != null){
        switchIn = (prev.end + cur.begin) / 2;
      }

      // Switch out at midpoint between this line end and next line begin.
      let switchOut = cur.end ?? (next?.begin ?? Infinity);
      if(next && cur.end != null && next.begin != null){
        switchOut = (cur.end + next.begin) / 2;
      }

      cur.switchIn = switchIn;
      cur.switchOut = switchOut;

      // x-bg should not visually fill before the main line's real start,
      // but the whole row can become active at switchIn.
      cur.visualBegin = cur.begin ?? switchIn;
    }
  }

  let targetScrollTop = 0;
  let currentScrollTop = 0;

  function setTargetScroll(idx){
    const el = lyricsEl.children[idx];
    if(!el) return;
    // Keep normal active lines high, but give top x-bg lines a little safe headroom.
    const hasTopBg = !!(lines[idx] && lines[idx].topBg && lines[idx].topBg.length);
    targetScrollTop = Math.max(0, el.offsetTop - (hasTopBg ? 34 : 8));
  }

  function shouldAutoScrollNow(){
    if(!lines.length) return false;
    const t = audio.currentTime || 0;
    const firstSwitch = lines[0]?.switchIn ?? lines[0]?.begin ?? 0;
    return t >= firstSwitch;
  }

  function updateSmoothScroll(){
    if(!autoScroll || !lines.length || !shouldAutoScrollNow()) return;
    const delta = targetScrollTop - currentScrollTop;
    if(Math.abs(delta) < 0.35){
      currentScrollTop = targetScrollTop;
    } else {
      currentScrollTop += delta * (window.__lineLerp || 0.082);
    }
    lyricsEl.scrollTop = currentScrollTop;
  }

  function activeLineAt(t){
    if(!lines.length) return -1;

    let lo=0, hi=lines.length-1, ans=-1;
    while(lo<=hi){
      const mid=(lo+hi)>>1;
      const b=lines[mid].switchIn ?? lines[mid].begin ?? 0;
      const e=lines[mid].switchOut ?? lines[mid].end ?? (lines[mid+1]?.switchIn ?? lines[mid+1]?.begin ?? Infinity);
      if(t < b) hi=mid-1;
      else if(t >= e) lo=mid+1;
      else { ans=mid; break; }
    }

    if(ans < 0){
      for(let i=0;i<lines.length;i++){
        if(t < (lines[i].switchIn ?? lines[i].begin ?? 0)) return Math.max(0, i-1);
      }
      return lines.length-1;
    }

    return ans;
  }

  function easeOutCubic(x){ return 1 - Math.pow(1-x, 3); }
  function liftCurve(p){
    p = Math.max(0, Math.min(1, p));
    // Smooth bump: up quickly, then down softly. 0 at begin/end, 1 near the first half.
    if(p < 0.28) return 1 - Math.pow(1 - p / 0.28, 3);
    if(p < 0.72) return 1;
    return Math.pow(1 - (p - 0.72) / 0.28, 2);
  }
  function updateFillForLine(lineEl, t, line){
    const spans = [...lineEl.querySelectorAll('.segment')];
    spans.forEach((s, i)=>{
      s.classList.remove('live','done');
      const b = parseTime(s.dataset.begin), e = parseTime(s.dataset.end);
      if(!beatMode || b == null || e == null || e <= b){
        const lb = line.begin ?? 0, le = line.end ?? lb + 1;
        const p = Math.max(0, Math.min(1, (t-lb)/Math.max(.001, le-lb)));
        const eased = easeOutCubic(p);
        s.style.setProperty('--p', eased.toFixed(3));
        const baseBoost = parseFloat(s.dataset.boostBase || '0') || 0;
        const liftPx = parseFloat(s.dataset.liftPx || '0') || 0;
        s.style.setProperty('--boost', (baseBoost * eased).toFixed(3));
        s.style.setProperty('--lift', (liftPx * liftCurve(p)).toFixed(3));
        if(p>=1){
          s.classList.add('done');
          s.style.setProperty('--lift', '0');
        }
        else if(p>0) s.classList.add('live');
        return;
      }
      const dur = Math.max(.001, e-b);
      const lead = 0;
      const tail = Math.min(.075, dur*.18);
      const raw = (t - b) / (dur + tail);
      const p = Math.max(0, Math.min(1, raw));
      const eased = p < .5 ? 2*p*p : 1 - Math.pow(-2*p + 2, 2) / 2;
      s.style.setProperty('--p', eased.toFixed(3));
      const baseBoost = parseFloat(s.dataset.boostBase || '0') || 0;
      const liftPx = parseFloat(s.dataset.liftPx || '0') || 0;
      const activeBoost = baseBoost * Math.min(1, Math.max(0, eased * 1.15));
      s.style.setProperty('--boost', activeBoost.toFixed(3));
      s.style.setProperty('--lift', (liftPx * liftCurve(p)).toFixed(3));
      if(t >= e + tail){
        s.classList.add('done');
        s.style.setProperty('--lift', '0');
      }
      else if(t >= b - lead && t <= e + tail) s.classList.add('live');
    });
  }
  function tick(){
    const t = audio.currentTime || 0;
    const d = audio.duration || 0;
    nowEl.textContent = fmtNow(t);
    leftEl.textContent = d ? fmtLeft(Math.max(0,d-t)) : '00:00';
    barFill.style.width = d ? `${Math.max(0,Math.min(100,t/d*100))}%` : '0%';

    const idx = activeLineAt(t);
    if(idx !== active){
      active = idx;
      [...lyricsEl.children].forEach((el,i)=>{
        el.classList.toggle('active', i===idx);
        el.classList.toggle('past', i<idx);
        el.classList.toggle('future', i>idx+2);
        el.classList.toggle('near', i===idx+1 || i===idx+2);
      });
      if(autoScroll && idx >= 0){
        setTargetScroll(idx);
      }
    }
    // Keep fill stable after scroll/seek: update active and nearby lines only.
    for(let k = Math.max(0, idx - 1); k <= Math.min(lines.length - 1, idx + 2); k++){
      const el = lyricsEl.children[k];
      if(el && lines[k]) updateFillForLine(el, t, lines[k]);
    }

    updateSmoothScroll();
    raf = requestAnimationFrame(tick);
  }
  function loop(){
    if(raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(tick);
  }

  function setColors(colors){
    const [a,b,c] = colors;
    document.documentElement.style.setProperty('--c1', a);
    document.documentElement.style.setProperty('--c2', b);
    document.documentElement.style.setProperty('--c3', c);
  }
  function rgbToHex(r,g,b){
    return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');
  }
  function extractCoverColors(img){
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently:true});
    const size = 96;
    canvas.width = canvas.height = size;
    ctx.drawImage(img,0,0,size,size);
    const data = ctx.getImageData(0,0,size,size).data;
    const buckets = new Map();
    for(let i=0;i<data.length;i+=16){
      const r=data[i], g=data[i+1], b=data[i+2], a=data[i+3];
      if(a<180) continue;
      const max=Math.max(r,g,b), min=Math.min(r,g,b);
      const sat=max-min;
      const lum=(r+g+b)/3;
      if(lum<18 || lum>238) continue;
      const key = `${r>>4},${g>>4},${b>>4}`;
      const score = sat*1.45 + Math.abs(lum-118)*.18 + 16;
      const cur = buckets.get(key) || {r:0,g:0,b:0,n:0,score:0};
      cur.r+=r; cur.g+=g; cur.b+=b; cur.n++; cur.score+=score;
      buckets.set(key,cur);
    }
    let arr = [...buckets.values()].map(x=>({r:x.r/x.n,g:x.g/x.n,b:x.b/x.n,score:x.score}));
    if(!arr.length) return ['#3d7d02','#174800','#071400'];
    arr.sort((x,y)=>y.score-x.score);
    const main = arr[0];
    const second = arr.find(x => Math.abs(x.r-main.r)+Math.abs(x.g-main.g)+Math.abs(x.b-main.b)>70) || arr[1] || main;
    const dark = {r:main.r*.28, g:main.g*.28, b:main.b*.28};
    return [rgbToHex(main.r,main.g,main.b), rgbToHex(second.r*.72,second.g*.72,second.b*.72), rgbToHex(dark.r,dark.g,dark.b)];
  }



  let clickAudioCtx = null;

  function playCosmicPluck(){
    try{
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if(!AudioContext) return;

      clickAudioCtx ||= new AudioContext();
      const ctx = clickAudioCtx;
      if(ctx.state === 'suspended') ctx.resume();

      const now = ctx.currentTime;

      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(0.18, now + 0.012);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 0.72);
      master.connect(ctx.destination);

      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(2400, now);
      filter.frequency.exponentialRampToValueAtTime(520, now + 0.55);
      filter.Q.setValueAtTime(7.5, now);
      filter.connect(master);

      const delay = ctx.createDelay(1.0);
      delay.delayTime.setValueAtTime(0.145, now);

      const feedback = ctx.createGain();
      feedback.gain.setValueAtTime(0.24, now);

      const wet = ctx.createGain();
      wet.gain.setValueAtTime(0.16, now);

      delay.connect(feedback);
      feedback.connect(delay);
      delay.connect(wet);
      wet.connect(master);

      const freqs = [392.00, 587.33, 783.99];
      freqs.forEach((freq, i)=>{
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;

        osc.type = i === 0 ? 'sine' : 'triangle';
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.985, now + 0.34);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(i === 0 ? 0.18 : 0.08, now + 0.01 + i * 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34 + i * 0.08);

        if(pan){
          pan.pan.setValueAtTime(i === 1 ? -0.25 : i === 2 ? 0.28 : 0, now);
          osc.connect(gain);
          gain.connect(pan);
          pan.connect(filter);
          pan.connect(delay);
        }else{
          osc.connect(gain);
          gain.connect(filter);
          gain.connect(delay);
        }

        osc.start(now);
        osc.stop(now + 0.8);
      });

      // tiny airy noise sparkle
      const bufferSize = Math.floor(ctx.sampleRate * 0.18);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const noiseGain = ctx.createGain();
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.setValueAtTime(1800, now);
      noiseGain.gain.setValueAtTime(0.025, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(master);
      noise.start(now);
      noise.stop(now + 0.2);
    }catch(_){}
  }

  async function handleTTMLFile(f){
    if(!f) return false;
    if(ttmlName) ttmlName.textContent = f.name;
    try{
      lines = parseTTML(await f.text());
      computeLineSwitches();
      computeTrackTempoStats();
      render();
      validate();
      loop();
      ttmlLoadedForFlow = true;
      setLoadStep('audio');
      if(startHint) startHint.textContent = `TTML loaded: ${f.name}`;
      setTimeout(()=>{ if(loadStep === 'audio' && startHint) startHint.textContent = 'Upload the audio file'; }, 650);
      return true;
    }catch(err){
      const msg = err.stack || err.message || err;
      if(issuesEl) issuesEl.innerHTML = `<div class="issue err"><b>Parse error:</b><pre style="white-space:pre-wrap">${escapeHtml(msg)}</pre></div>`;
      if(errorToast){
        errorToast.textContent = 'TTML error: ' + String(msg).split('\n')[0];
        errorToast.classList.add('visible');
        setTimeout(()=>errorToast.classList.remove('visible'), 5200);
      }
      if(startHint) startHint.textContent = 'TTML failed to load. Try another file.';
      if(startFlowBtn) startFlowBtn.textContent = 'TRY TTML AGAIN';
      loadStep = 'ttml';
      return false;
    }
  }

    audio.src = audioUrl;

  function handleCoverFile(f){

  let isSeeking = false;
  let isSeekPointerDown = false;
  let isSeekPreviewing = false;
  let seekPointerId = null;
  let seekStartX = 0;
  let seekLatestX = 0;
  let seekPreviewRaf = null;
  let wasPlayingBeforeSeek = false;
  let suppressSeekClick = false;

  function ratioFromClientX(clientX){
    const rect = bar.getBoundingClientRect();
    return Math.max(0, Math.min(1, (clientX - rect.left) / Math.max(1, rect.width)));
  }

  function timeFromClientX(clientX){
    const d = audio.duration;
    if(!d || !Number.isFinite(d)) return null;
    return ratioFromClientX(clientX) * d;
  }

  function paintSeekPreview(nextTime){
    const d = audio.duration;
    if(!d || !Number.isFinite(d) || nextTime == null) return;

    const clamped = Math.max(0, Math.min(d, nextTime));
    const ratio = d ? clamped / d : 0;

    nowEl.textContent = fmtNow(clamped);
    leftEl.textContent = fmtLeft(Math.max(0, d - clamped));
    barFill.style.width = `${Math.max(0, Math.min(100, ratio * 100))}%`;

    const idx = activeLineAt(clamped);
    if(idx !== active){
      active = idx;
      [...lyricsEl.children].forEach((el,i)=>{
        el.classList.toggle('active', i===idx);
        el.classList.toggle('past', i<idx);
        el.classList.toggle('future', i>idx+2);
        el.classList.toggle('near', i===idx+1 || i===idx+2);
      });
      if(autoScroll && idx >= 0){
        setTargetScroll(idx);
      }
    }

    for(let k = Math.max(0, idx - 1); k <= Math.min(lines.length - 1, idx + 2); k++){
      const el = lyricsEl.children[k];
      if(el && lines[k]) updateFillForLine(el, clamped, lines[k]);
    }

    if(autoScroll && idx >= 0){
      const delta = targetScrollTop - currentScrollTop;
      if(Math.abs(delta) < 0.8) currentScrollTop = targetScrollTop;
      else currentScrollTop += delta * 0.18;
      lyricsEl.scrollTop = currentScrollTop;
    }
  }

  function requestSeekPreview(clientX){
    seekLatestX = clientX;
    if(seekPreviewRaf) return;
    seekPreviewRaf = requestAnimationFrame(()=>{
      seekPreviewRaf = null;
      paintSeekPreview(timeFromClientX(seekLatestX));
    });
  }

  function commitSeek(clientX){
    const nextTime = timeFromClientX(clientX);
    if(nextTime == null) return;
    if(seekPreviewRaf){
      cancelAnimationFrame(seekPreviewRaf);
      seekPreviewRaf = null;
    }

    paintSeekPreview(nextTime);
    audio.currentTime = nextTime;
    active = -1;

    const idx = activeLineAt(nextTime);
    if(idx >= 0){
      setTargetScroll(idx);
      currentScrollTop = targetScrollTop;
      lyricsEl.scrollTop = currentScrollTop;
    }
  }

  function beginSeekDrag(e){
    if(isSeeking) return;
    isSeeking = true;
    isSeekPreviewing = true;
    wasPlayingBeforeSeek = !audio.paused;
    bar.classList.add('dragging');
    bar.setPointerCapture?.(e.pointerId);
    requestSeekPreview(e.clientX);
  }

  bar.addEventListener('pointerdown', e=>{
    if(!audio.duration || !Number.isFinite(audio.duration)) return;

    isSeekPointerDown = true;
    isSeeking = false;
    isSeekPreviewing = false;
    seekPointerId = e.pointerId;
    seekStartX = e.clientX;
    seekLatestX = e.clientX;
    wasPlayingBeforeSeek = !audio.paused;
  });

  bar.addEventListener('pointermove', e=>{
    if(!isSeekPointerDown || e.pointerId !== seekPointerId) return;

    const dx = Math.abs(e.clientX - seekStartX);
    if(!isSeeking && dx >= 5){
      beginSeekDrag(e);
    }

    if(isSeeking){
      e.preventDefault();
      requestSeekPreview(e.clientX);
    }
  });

  function finishSeekPointer(e, cancelled=false){
    if(!isSeekPointerDown && !isSeeking) return;

    const wasDragging = isSeeking;
    isSeekPointerDown = false;
    isSeeking = false;
    isSeekPreviewing = false;

    if(wasDragging){
      suppressSeekClick = true;
      setTimeout(()=>{ suppressSeekClick = false; }, 0);
      bar.classList.remove('dragging');
      try{ bar.releasePointerCapture?.(e.pointerId); }catch(_){}

      if(!cancelled){
        commitSeek(e.clientX);
        if(wasPlayingBeforeSeek && audio.paused) audio.play();
      }
    }
  }

  bar.addEventListener('pointerup', e=>{
    if(e.pointerId !== seekPointerId) return;

    if(isSeeking){
      finishSeekPointer(e, false);
      return;
    }

    // Simple click / tap: do not enlarge the bar, just seek once.
    isSeekPointerDown = false;
    commitSeek(e.clientX);
  });

  bar.addEventListener('pointercancel', e=>finishSeekPointer(e, true));

  bar.addEventListener('lostpointercapture', ()=>{
    if(isSeeking){
      isSeeking = false;
      isSeekPointerDown = false;
      isSeekPreviewing = false;
      bar.classList.remove('dragging');
    }
  });

  bar.addEventListener('click', e=>{
    if(suppressSeekClick) return;
    const d = audio.duration;
    if(!d || !Number.isFinite(d)) return;
    commitSeek(e.clientX);
  });

  document.addEventListener('keydown', e=>{
    const target = e.target;
    const typing = target && (
      target.tagName === 'INPUT' ||
      target.tagName === 'TEXTAREA' ||
      target.isContentEditable
    );
    if(typing) return;

    if(e.code==='Space'){ e.preventDefault(); if(playBtn) playBtn.click(); else { if(audio.paused) audio.play(); else audio.pause(); } }
    if(e.key==='i') side.classList.toggle('show');
  });

  // default cover visual
  coverView.removeAttribute('src');
  setLoadStep('start');
  loop();
})();
</script>
</body>
</html>
