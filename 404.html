<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Syncly — 404</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="shortcut icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <meta name="application-name" content="Syncly">
  <meta name="theme-color" content="#000000">
  <style>
    :root{
      --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      display:grid;
      place-items:center;
      padding:24px;
      background:
        radial-gradient(circle at 35% 20%, rgba(255,255,255,.13), transparent 28%),
        radial-gradient(circle at 72% 78%, rgba(255,255,255,.08), transparent 34%),
        #050505;
      color:white;
      font-family:var(--font);
      overflow:hidden;
    }
    .card{
      width:min(420px,100%);
      border:1px solid rgba(255,255,255,.12);
      border-radius:34px;
      padding:34px 28px 28px;
      background:rgba(255,255,255,.06);
      box-shadow:0 24px 80px rgba(0,0,0,.45);
      backdrop-filter:blur(28px);
      -webkit-backdrop-filter:blur(28px);
      text-align:center;
    }
    img{
      width:92px;
      height:92px;
      border-radius:24px;
      object-fit:cover;
      box-shadow:0 14px 34px rgba(0,0,0,.28);
    }
    h1{
      margin:22px 0 8px;
      font-size:46px;
      line-height:.95;
      letter-spacing:-.06em;
      font-weight:850;
    }
    p{
      margin:0 auto;
      max-width:290px;
      color:rgba(255,255,255,.58);
      font-size:15px;
      line-height:1.38;
      font-weight:560;
      letter-spacing:-.015em;
    }
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:24px;
      min-width:160px;
      height:48px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      color:#050505;
      text-decoration:none;
      font-size:15px;
      font-weight:800;
      letter-spacing:-.025em;
      transition:transform 160ms ease, background 160ms ease;
    }
    a:hover{background:#fff;transform:scale(1.025)}
    a:active{transform:scale(.97)}
    .code{
      margin-top:14px;
      color:rgba(255,255,255,.26);
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="./favicon.png" alt="Syncly logo">
    <h1>Page not found</h1>
    <p>This page does not exist. Go back to Syncly and load your TTML, audio, and artwork.</p>
    <a href="/player/">Back to Syncly</a>
    <div class="code">404</div>
  </main>
</body>
</html>
